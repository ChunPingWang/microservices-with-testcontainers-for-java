name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit + ArchUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v3
      - name: Unit + ArchUnit tests (no containers)
        run: |
          ./gradlew :shared-kernel:test \
                    :product-service:test \
                    :payment-service:test \
                    :inventory-service:test \
                    --tests "*Test" --tests "*HexagonalArchitectureTest" \
                    -x ":product-service:integrationTest" \
                    --no-daemon

  integration:
    name: Integration (per service, containerised)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, payment-service, inventory-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v3
      - name: Integration tests for ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:test --tests "*IT" --no-daemon

  e2e:
    name: End-to-end full chain
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v3
      - name: E2E
        run: ./gradlew :e2e-tests:test --no-daemon
